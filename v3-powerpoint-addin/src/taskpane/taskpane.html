<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doodle Studio — PowerPoint</title>
  <link rel="preconnect" href="https://appsforoffice.microsoft.com" />
  <link rel="stylesheet" href="taskpane.css" />
</head>
<body>
  <header class="topbar">
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M3 16c1.2-3.5 2-6.5 3.5-6.5S8 15 9.5 15s2-9 4-9 2.3 6 3.5 8.5"/><path d="M5 19c3-1.2 11-1.2 14 0"/></svg>
    </div>
    <div>
      <h1>Doodle Studio <span class="pill">v3</span></h1>
      <small id="hostLabel">Carregando…</small>
    </div>
  </header>

  <!-- Drawing surface (slide backdrop + transparent canvas on top) -->
  <div class="draw-wrap" id="drawWrap">
    <div class="draw-bg" id="drawBg"></div>
    <canvas id="drawCanvas"></canvas>
  </div>

  <div class="bar">
    <button class="btn" id="bgBtn" title="Usar o slide como fundo — copie o slide (Cmd+C) antes">📋 Fundo do slide</button>
    <span class="spacer"></span>
    <button class="btn icon" id="undoBtn" title="Desfazer">↶</button>
    <button class="btn icon" id="redoBtn" title="Refazer">↷</button>
    <button class="btn icon danger" id="clearBtn" title="Limpar tudo">⌫</button>
  </div>

  <button class="btn block" id="bigBtn" title="Abrir uma janela ampla para desenhar com o slide ao fundo">⤢ Tela grande para desenhar</button>

  <section class="insert-group">
    <label class="opt-row"><input type="checkbox" id="insertSeparate" /> Inserir cada traço separado <span class="hint-inline">(imagem e GIF)</span></label>
    <button class="btn primary block" id="insertBtn" disabled>Inserir no slide</button>
    <button class="btn block" id="gifBtn" disabled>▶ Inserir como GIF animado</button>
    <div class="gif-opts">
      <label class="opt-row"><input type="checkbox" id="gifLoop" checked /> GIF em loop</label>
      <div class="slabel"><span>Duração do GIF</span><b id="gifDurVal">2.5s</b></div>
      <input type="range" id="gifDur" min="10" max="60" value="25" aria-label="Duração do GIF" />
    </div>
  </section>
  <div class="status" id="status">Desenhe um traço para começar.</div>

  <!-- Config: Color -->
  <section class="sec">
    <div class="sec-head">Cor</div>
    <div class="palette" id="palette"></div>
    <div class="row">
      <input type="text" id="hexInput" class="hex" value="#FD5E6D" maxlength="7" aria-label="Cor em hexadecimal" />
      <label class="pick" id="pickBtn" style="background:#FD5E6D" title="Seletor de cor">
        <input type="color" id="colorPicker" value="#FD5E6D" />
      </label>
    </div>
  </section>

  <!-- Config: Smoothing -->
  <section class="sec">
    <div class="sec-head">Suavização</div>
    <div class="slabel"><span>Estabilizador do movimento</span><b id="mouseSmoothVal">50%</b></div>
    <input type="range" id="mouseSmooth" min="0" max="100" value="50" aria-label="Estabilizador do movimento" />
    <div class="slabel"><span>Suavização vetorial</span><b id="vectorSmoothVal">0%</b></div>
    <input type="range" id="vectorSmooth" min="0" max="100" value="0" aria-label="Suavização vetorial" />
  </section>

  <div class="hint">Dica: segure <kbd>Shift</kbd> para linha reta · <kbd>Cmd+V</kbd> cola uma imagem de fundo.</div>

  <!-- UI + drawing run immediately; office.js loads deferred so it never blocks first paint -->
  <script src="../engine/doodle-engine.js"></script>
  <script src="../shared/controls.js"></script>
  <script src="../office/office-bridge.js"></script>
  <script src="taskpane.js"></script>
  <script defer src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</body>
</html>
