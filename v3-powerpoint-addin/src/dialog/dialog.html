<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doodle Studio — Tela grande</title>
  <link rel="preconnect" href="https://appsforoffice.microsoft.com" />
  <link rel="stylesheet" href="../taskpane/taskpane.css" />
  <link rel="stylesheet" href="dialog.css" />
</head>
<body>
  <!-- Drawing stage -->
  <div class="stage">
    <div class="stage-bar">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 16c1.2-3.5 2-6.5 3.5-6.5S8 15 9.5 15s2-9 4-9 2.3 6 3.5 8.5"/><path d="M5 19c3-1.2 11-1.2 14 0"/></svg>
      </div>
      <h1>Desenhar sobre o slide</h1>
      <button class="btn" id="bgBtn" title="Usar o slide copiado (Cmd+C) como fundo">📋 Fundo do slide</button>
      <label class="opacity-ctl">Fundo
        <input type="range" id="bgOpacity" min="0" max="100" value="55" aria-label="Opacidade do fundo do slide" />
      </label>
      <span class="spacer"></span>
      <button class="btn icon" id="undoBtn" title="Desfazer">↶</button>
      <button class="btn icon" id="redoBtn" title="Refazer">↷</button>
      <button class="btn icon danger" id="clearBtn" title="Limpar tudo">⌫</button>
      <span class="bar-sep"></span>
      <button class="btn icon" id="zoomOutBtn" title="Diminuir zoom">−</button>
      <span id="zoomLabel" class="zoom-label">100%</span>
      <button class="btn icon" id="zoomInBtn" title="Aumentar zoom">+</button>
      <button class="btn icon" id="zoomFitBtn" title="Ajustar">⤢</button>
      <span class="bar-sep"></span>
      <label class="opacity-ctl" style="gap:6px;"><input type="checkbox" id="insertSeparate" /> Separados</label>
      <button class="btn" id="cancelBtn">Cancelar</button>
      <button class="btn primary" id="insertBtn" disabled>Inserir no slide</button>
    </div>
    <div class="stage-canvas">
      <div class="big-wrap">
        <div class="draw-bg" id="drawBg"></div>
        <canvas id="drawCanvas"></canvas>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <aside class="dlg-panel">
    <section class="sec">
      <div class="sec-head">Cor</div>
      <div class="palette" id="palette"></div>
      <div class="row">
        <input type="text" id="hexInput" class="hex" value="#FD5E6D" maxlength="7" aria-label="Cor em hexadecimal" />
        <label class="pick" id="pickBtn" style="background:#FD5E6D" title="Seletor de cor">
          <input type="color" id="colorPicker" value="#FD5E6D" />
        </label>
      </div>
    </section>

    <section class="sec">
      <div class="sec-head">Suavização</div>
      <div class="slabel"><span>Estabilizador do movimento</span><b id="mouseSmoothVal">50%</b></div>
      <input type="range" id="mouseSmooth" min="0" max="100" value="50" aria-label="Estabilizador do movimento" />
      <div class="slabel"><span>Suavização vetorial</span><b id="vectorSmoothVal">0%</b></div>
      <input type="range" id="vectorSmooth" min="0" max="100" value="0" aria-label="Suavização vetorial" />
    </section>

    <section class="sec">
      <div class="sec-head">GIF animado</div>
      <button class="btn primary block" id="gifBtn" disabled style="margin-bottom:10px;">▶ Inserir como GIF</button>
      <label class="opt-row"><input type="checkbox" id="gifLoop" checked /> Em loop</label>
      <div class="slabel"><span>Duração</span><b id="gifDurVal">2.5s</b></div>
      <input type="range" id="gifDur" min="10" max="60" value="25" aria-label="Duração do GIF" />
      <div class="anim-row2">
        <div class="anim-field">
          <label for="gifEasing">Curva</label>
          <select id="gifEasing">
            <option value="linear">Constante</option>
            <option value="easeIn">Ease-In</option>
            <option value="easeOut">Ease-Out</option>
            <option value="easeInOut">Ease-In-Out</option>
          </select>
        </div>
        <div class="anim-field">
          <label for="gifFps">FPS</label>
          <select id="gifFps">
            <option value="12">12</option>
            <option value="15" selected>15</option>
            <option value="25">25</option>
            <option value="30">30</option>
          </select>
        </div>
      </div>
      <div class="slabel"><span>Segurar no final</span><b id="gifHoldVal">600ms</b></div>
      <input type="range" id="gifHold" min="0" max="2000" value="600" step="50" aria-label="Segurar no final" />
    </section>

    <section class="sec">
      <div class="sec-head">Biblioteca</div>
      <button class="btn block" id="saveAllBtn" disabled style="margin-bottom:8px;">Salvar tudo na biblioteca</button>
      <button class="btn block" id="saveSelBtn" disabled title="Clique num traço para selecioná-lo">Salvar traço selecionado</button>
      <div class="hint-inline" style="margin-top:8px;">Aparece na biblioteca do painel lateral.</div>
    </section>

    <div class="hint">Segure <kbd>Shift</kbd> para linha reta · clique num traço para selecioná-lo · <kbd>Cmd+V</kbd> cola uma imagem de fundo.</div>
  </aside>

  <script src="../engine/doodle-engine.js"></script>
  <script src="../shared/controls.js"></script>
  <script src="../shared/library.js"></script>
  <script src="dialog.js"></script>
  <script defer src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</body>
</html>
